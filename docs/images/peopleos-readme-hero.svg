<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title description">
  <title id="title">PeopleOS — Human Capital Operating System</title>
  <desc id="description">Identidad visual de PeopleOS sobre una composición de datos, personas y gobierno empresarial.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061e1a"/>
      <stop offset=".58" stop-color="#0b352d"/>
      <stop offset="1" stop-color="#123f3b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a4f0d0"/>
      <stop offset="1" stop-color="#51d7d2"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#00130f" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="32" fill="url(#background)"/>
  <circle cx="1390" cy="70" r="210" fill="#44d7cf" opacity=".14" filter="url(#blur)"/>
  <circle cx="1080" cy="510" r="170" fill="#b4f6d6" opacity=".12" filter="url(#blur)"/>
  <path d="M0 420C290 334 478 496 750 398c277-100 483-259 850-179v301H0Z" fill="#0f4c40" opacity=".48"/>

  <g transform="translate(92 82)">
    <rect width="78" height="78" rx="22" fill="#a7f2d2"/>
    <text x="39" y="53" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#082b24">P</text>
    <text x="0" y="145" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" letter-spacing="-3" fill="#ffffff">PeopleOS</text>
    <text x="2" y="192" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#8fe7ca">HUMAN CAPITAL OPERATING SYSTEM</text>
    <text x="2" y="264" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#dcebe6">Personas, talento y gobierno SaaS</text>
    <text x="2" y="303" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#dcebe6">en una plataforma segura y multiempresa.</text>
    <g transform="translate(2 347)">
      <rect width="178" height="48" rx="24" fill="#a7f2d2"/>
      <text x="89" y="31" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#092d25">LARAVEL 12</text>
      <rect x="194" width="210" height="48" rx="24" fill="#ffffff" opacity=".1" stroke="#a7f2d2" stroke-opacity=".5"/>
      <text x="299" y="31" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" fill="#dff8ee">ENTERPRISE FOUNDATION</text>
    </g>
  </g>

  <g transform="translate(930 64)" filter="url(#shadow)">
    <rect width="560" height="388" rx="28" fill="#f7faf8"/>
    <rect width="560" height="80" rx="28" fill="#ffffff"/>
    <rect y="55" width="560" height="25" fill="#ffffff"/>
    <circle cx="46" cy="40" r="17" fill="#a7f2d2"/>
    <rect x="78" y="28" width="130" height="12" rx="6" fill="#0e3a31"/>
    <rect x="78" y="48" width="86" height="8" rx="4" fill="#9cb2aa"/>

    <g transform="translate(34 110)">
      <rect width="492" height="94" rx="18" fill="#0d4237"/>
      <circle cx="46" cy="47" r="25" fill="none" stroke="#76dfbb" stroke-width="2" opacity=".55"/>
      <circle cx="46" cy="47" r="9" fill="#a7f2d2"/>
      <rect x="88" y="27" width="148" height="10" rx="5" fill="#79dfbd"/>
      <rect x="88" y="48" width="226" height="16" rx="8" fill="#ffffff"/>
      <rect x="352" y="23" width="106" height="48" rx="12" fill="#ffffff" opacity=".09"/>
      <text x="405" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#a7f2d2">360°</text>
    </g>

    <g transform="translate(34 222)">
      <rect width="150" height="132" rx="18" fill="#ffffff" stroke="#dce7e2"/>
      <rect x="18" y="20" width="66" height="8" rx="4" fill="#7d948c"/>
      <text x="18" y="71" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#092d25">1,248</text>
      <rect x="18" y="92" width="96" height="8" rx="4" fill="#a7f2d2"/>

      <rect x="171" width="150" height="132" rx="18" fill="#ffffff" stroke="#dce7e2"/>
      <rect x="189" y="20" width="86" height="8" rx="4" fill="#7d948c"/>
      <text x="189" y="71" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#092d25">98%</text>
      <rect x="189" y="92" width="110" height="8" rx="4" fill="#55d3cf"/>

      <rect x="342" width="150" height="132" rx="18" fill="#ffffff" stroke="#dce7e2"/>
      <rect x="360" y="20" width="74" height="8" rx="4" fill="#7d948c"/>
      <path d="M360 103 382 77l22 12 24-35 22 18 24-35" fill="none" stroke="url(#glow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
