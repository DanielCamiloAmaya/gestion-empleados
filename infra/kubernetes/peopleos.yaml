apiVersion: apps/v1
kind: Deployment
metadata:
  name: peopleos-web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app: peopleos, component: web}
  template:
    metadata:
      labels: {app: peopleos, component: web}
    spec:
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: {app: peopleos, component: web}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: peopleos, component: web}
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: web
          image: ghcr.io/replace-with-your-org/peopleos@sha256:replace-with-release-digest
          imagePullPolicy: IfNotPresent
          ports: [{name: http, containerPort: 8080}]
          envFrom:
            - configMapRef: {name: peopleos-config}
            - secretRef: {name: peopleos-secrets}
          readinessProbe: {httpGet: {path: /health/ready, port: http}, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3}
          livenessProbe: {httpGet: {path: /up, port: http}, initialDelaySeconds: 30, periodSeconds: 20, timeoutSeconds: 3}
          resources:
            requests: {cpu: 250m, memory: 384Mi}
            limits: {cpu: "1", memory: 768Mi}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: ["ALL"]}}
          lifecycle:
            preStop:
              exec: {command: ["/bin/sh", "-c", "kill -QUIT 1 || true"]}
---
apiVersion: v1
kind: Service
metadata: {name: peopleos-web}
spec:
  selector: {app: peopleos, component: web}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: peopleos-web}
spec:
  minAvailable: 2
  selector:
    matchLabels: {app: peopleos, component: web}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: peopleos-web}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: peopleos-web}
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleDown: {stabilizationWindowSeconds: 300}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 65}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peopleos-worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1, maxSurge: 1}
  selector:
    matchLabels: {app: peopleos, component: worker}
  template:
    metadata:
      labels: {app: peopleos, component: worker}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: peopleos, component: worker}
      containers:
        - name: worker
          image: ghcr.io/replace-with-your-org/peopleos@sha256:replace-with-release-digest
          imagePullPolicy: IfNotPresent
          command: ["php", "artisan", "queue:work", "--sleep=2", "--tries=3", "--timeout=90", "--max-time=3600"]
          envFrom:
            - configMapRef: {name: peopleos-config}
            - secretRef: {name: peopleos-secrets}
          resources:
            requests: {cpu: 150m, memory: 256Mi}
            limits: {cpu: "1", memory: 512Mi}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: ["ALL"]}}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: peopleos-worker}
spec:
  minAvailable: 1
  selector:
    matchLabels: {app: peopleos, component: worker}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: peopleos-scheduler
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels: {app: peopleos, component: scheduler}
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
          containers:
            - name: scheduler
              image: ghcr.io/replace-with-your-org/peopleos@sha256:replace-with-release-digest
              imagePullPolicy: IfNotPresent
              command: ["php", "artisan", "schedule:run", "--no-interaction"]
              envFrom:
                - configMapRef: {name: peopleos-config}
                - secretRef: {name: peopleos-secrets}
              resources:
                requests: {cpu: 50m, memory: 128Mi}
                limits: {cpu: 300m, memory: 256Mi}
              securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: ["ALL"]}}
